- name: get the username (non-root)
  set_fact:
    the_user: "{{ ansible_facts['user_id'] }}"
    local_home: "{{ lookup('env', 'HOME') }}"

- name: Copy id_rsa.pub
  authorized_key:
    user="{{ the_user }}"
    key="{{ lookup('file', local_home + '/.ssh/id_rsa.pub') }}"
    manage_dir=yes

- name: generate locale
  shell:
    cmd: locale-gen en_AU.UTF-8
  become: true

- name: install zsh
  apt:
    name: zsh
    state: present
    update_cache: true
  become: true

- name: change user shell to zsh
  block:
    - name: change shell
      become: true
      ansible.builtin.user:
        name: "{{ the_user }}"
        shell: /bin/zsh
  rescue:
    - name: run zsh on login
      ansible.builtin.blockinfile:
        path: "{{ ansible_facts['env'].HOME }}/.profile"
        block: "{{ lookup('ansible.builtin.file', 'zsh-shell.sh') }}"
        state: present

- name: download dotfiles
  ansible.builtin.git:
    repo: "git@github.com:smutch/dotfiles.git"
    dest: "{{ ansible_facts['env'].HOME }}/dotfiles"
    accept_hostkey: true

- name: install dotfiles
  shell:
    chdir: "{{ ansible_facts['env'].HOME }}/dotfiles"
    cmd: ./install linux
    executable: /bin/zsh

- name: copy ghostty terminfo (global)
  shell:
    cmd: tic -x -
    stdin: "{{ lookup('pipe', 'infocmp -x ghostty') }}"

- name: copy ghostty terminfo (pixi installed tmux)
  shell:
    cmd: "{{ ansible_facts['env'].HOME }}/.pixi/envs/tmux/bin/tic -x -"
    stdin: "{{ lookup('pipe', 'infocmp -x ghostty') }}"

- name: install UV
  shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh -s -- -q
  args:
    creates: "{{ ansible_facts['env'].HOME }}/.local/bin/uv"
